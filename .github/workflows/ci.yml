name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Test and check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
          package-manager-cache: false

      - name: Print Node.js and npm versions
        run: |
          node --version
          npm --version

      - name: Verify Node.js version
        run: test "$(node --version)" = "v22.23.1"

      - name: Check changed whitespace
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              git diff --check "${{ github.event.before }}" "${{ github.sha }}"
              ;;
            workflow_dispatch)
              git diff --check "${{ github.sha }}^" "${{ github.sha }}"
              ;;
          esac

      - name: Syntax-check JavaScript files
        working-directory: web
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(
            find server scripts src public tests -type f \( -name '*.mjs' -o -name '*.js' \) -print0
          )

      - name: Run checks
        working-directory: web
        run: npm run check

      - name: Run tests
        working-directory: web
        run: npm test

      - name: Check for SQLite artifacts
        run: |
          if find . -type f \( -name '*.sqlite' -o -name '*.sqlite3' -o -name '*.db' -o -name '*-wal' -o -name '*-shm' \) -print -quit | grep -q .; then
            echo "SQLite artifacts must not be committed to the repository."
            exit 1
          fi
