services:
  smartrecord:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: smartrecord-pack-station:ugreen
    container_name: smartrecord-pack-station
    platform: linux/amd64
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.0"
    environment:
      NODE_ENV: production
      TZ: Asia/Bangkok
      PORT: 4173
      SMARTRECORD_CONFIG_PATH: /data/smartrecord/config/app-config.json
      SMARTRECORD_ORDERS_PATH: /data/smartrecord/data/orders.json
      SMARTRECORD_SYNC_ORDERS_PATH: /data/smartrecord/data/sync-orders.json
      SMARTRECORD_PACK_RECORDS_PATH: /data/smartrecord/data/pack-records.json
      SMARTRECORD_RUNTIME_ROOT: /data/smartrecord
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 4173) + '/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - ./smartrecord-data:/data/smartrecord
